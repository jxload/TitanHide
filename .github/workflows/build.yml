name: Build TitanHide Driver

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Environment info
        shell: powershell
        run: |
          Write-Host "== VSWHERE =="
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -all -products * -prerelease

          Write-Host "== Windows Kits folder =="
          if (Test-Path "C:\Program Files (x86)\Windows Kits") {
            Get-ChildItem "C:\Program Files (x86)\Windows Kits" -Force
          } else {
            Write-Host "No Windows Kits folder"
          }

          Write-Host "== Solution file exists? =="
          Get-ChildItem -Path . -Filter *.sln -Recurse

      - name: Build
        shell: cmd
        run: |
          msbuild TitanHide.sln /m /t:Rebuild /p:Configuration=Release /p:Platform=x64 /verbosity:normal

      - name: Collect outputs
        shell: powershell
        run: |
          $artifacts = Join-Path $PWD "artifacts"
          if (-not (Test-Path $artifacts)) { New-Item -ItemType Directory -Path $artifacts | Out-Null }

          # Collect files of interest but skip anything already under artifacts to avoid copying onto itself
          Get-ChildItem -Recurse -File | Where-Object {
            ($_.Extension -in ".sys", ".inf", ".cat", ".pdb", ".dll", ".exe", ".log") -and ($_.FullName -notlike "$($artifacts)*")
          } | ForEach-Object {
            $dest = Join-Path $artifacts $_.Name
            Copy-Item -Path $_.FullName -Destination $dest -Force
          }

          Write-Host "Collected files:"
          Get-ChildItem $artifacts

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: TitanHide-${{ github.sha }}
          path: artifacts/
